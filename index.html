<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        body div{
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gameArea" width="600" height="300"></canvas>
    <div>
        <button id="attach">attach</button>
        <button id="detach">detach</button>
    </div>
    <div>
        <button id="controllerOn">controllerOn</button>
        <button id="controllerOff">controllerOff</button>
    </div>
    <div>
        <button id="enableActionLeft">enableActionLeft</button>
        <button id="disableActionLeft">disableActionLeft</button>
    </div>
    <div>
        <button id="bindSpace">bindSpace</button>
    </div>
    <script src="input-controller.js"></script>
    <script src="keyboard-plugin.js"></script>
    <script src="mouse-plugin.js"></script>
    <script src="input-controller-test.js"></script>
</body>
</html>
